version: "3.9"

services:

  api:
    build: .
    container_name: chatbot-api

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      - qdrant
      - mongo

  qdrant:
    image: qdrant/qdrant:latest

    ports:
      - "6333:6333"

    volumes:
      - qdrant_data:/qdrant/storage

  mongo:
    image: mongo:8

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

volumes:
  qdrant_data:
  mongo_data: